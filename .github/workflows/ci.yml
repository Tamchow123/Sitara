name: CI

on:
  push:
  pull_request:

# Safety: CI never receives provider secrets and always runs fail-closed.
env:
  DEMO_MODE: "true"
  ALLOW_PAID_AI_CALLS: "false"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_USER: sitara
          POSTGRES_PASSWORD: sitara-ci-password
          POSTGRES_DB: sitara
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sitara -d sitara"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7.4.1-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      APP_ENV: development
      DEBUG: "true"
      DATABASE_URL: postgres://sitara:sitara-ci-password@localhost:5432/sitara
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      # Storage checks are mocked in tests; these values point nowhere real.
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY_ID: ci-placeholder
      S3_SECRET_ACCESS_KEY: ci-placeholder
      S3_BUCKET_NAME: sitara-media
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Pinned to match the backend Docker image (python:3.12.7-slim-bookworm).
          python-version: "3.12.7"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies (hash-verified lock)
        run: pip install --require-hashes -r requirements.txt
      - name: Dependency lock freshness
        run: |
          python -m pip install --upgrade "pip==26.0.1"
          python -m pip install "pip-tools==7.5.3"
          python -m piptools compile \
            --generate-hashes \
            --output-file requirements.txt \
            requirements.in
          git diff --exit-code -- requirements.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Django system check
        run: python manage.py check
      - name: Migration consistency
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build
