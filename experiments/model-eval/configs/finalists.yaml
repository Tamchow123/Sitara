# Stage B: finalist round.
#
# EDIT `models:` after screening — it must list the top TWO models chosen by
# human review of the screening contact sheets. The values shipped here are
# placeholders, not a pre-judged outcome.
#
# This stage exercises the full 30-brief matrix with multiple seeds,
# production portrait framing, all three inspiration modes (text-only vs
# curated metadata vs actual reference images, where briefs define them),
# both refinement strategies (fresh regeneration vs image editing), and
# every prompt format each model supports (editorial, sectioned, JSON where
# officially supported).
#
# This config runs the breadth matrix at ONE seed. Multi-seed evaluation is
# a separate, deliberately scoped round: configs/seed_stability.yaml runs
# three seeds over a reduced representative brief subset.
#
# ALWAYS check the plan before running:
#   python -m model_eval.cli plan --config configs/finalists.yaml --budget-usd 60
# As shipped the plan is 250 runnable requests with a ~46 USD conservative
# reservation ceiling, plus visible skips for every reference_image request
# until references/manifest.yaml has verified entries (a live finalist run
# FAILS preflight until then, or until reference_image is removed from
# inspiration_modes). FLUX.2 billing formulas are unresolved, so their
# successful generations are accounted at the FULL reserved amount — budget
# to the ceiling, not to optimistic estimates. Trim brief_ids or
# prompt_formats if that exceeds what you are prepared to pay. Human review
# remains authoritative: nothing in this config auto-selects a winner.

stage: finalist
candidates_file: model_candidates.yaml
briefs_file: ../prompts/briefs.yaml
reference_manifest: ../references/manifest.yaml

# PLACEHOLDERS — replace with the two screening winners before running.
models:
  - flux-2-pro
  - flux-2-max

brief_ids: all
seeds: [11]
aspect_ratio: "3:4"
inspiration_modes: [text_only, metadata, reference_image]
prompt_formats: auto
refinement:
  enabled: true
  strategies: [fresh_regeneration, image_edit]

# Optional per-model input overrides, e.g. higher-quality settings:
# model_params:
#   flux-2-max:
#     resolution: "2 MP"
model_params: {}

notes: >-
  metadata mode only runs on briefs that define inspiration_metadata;
  reference_image mode only on briefs that list reference_ids AND only
  against manifest entries whose rights_status is verified. Refinement
  experiments anchor to the editorial/text_only cell per (brief, model,
  seed). Seed reuse in fresh regeneration is a continuity aid only — it does
  not guarantee the garment is preserved.
