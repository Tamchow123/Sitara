  - key: klein-4b
    name: FLUX.2 klein 4B
    replicate_id: black-forest-labs/flux-2-klein-4b
    version: null
    categories: [fast, reference, editing]
    capabilities:
      text_to_image: true
      seed: true
      seed_param: seed
      aspect_ratios: ["1:1", "16:9", "9:16", "3:2", "2:3", "4:3", "3:4", "5:4", "4:5", "21:9", "9:21", "match_input_image"]
      resolution_note: "output_megapixels enum 0.25 / 0.5 / 1 / 2 / 4 (default 1)"
      negative_prompt: false
      reference_image: true
      reference_image_param: images
      max_reference_images: 5
      image_editing: true
      image_editing_param: images
      image_editing_param_is_list: true
      json_prompting: false
      input_format_note: >-
        prompt, seed, images (array, max 5; image-to-image / reference),
        aspect_ratio, output_megapixels, output_format webp/jpg/png (default
        jpg), go_fast, disable_safety_checker. JSON prompting is documented
        for the FLUX.2 family generally but klein-specific support is
        unverified, so it is disabled here until verified.
    pricing:
      unit: per_megapixel
      usd_per_unit: 0.001
      usd_per_run: 0.0
      usd_per_input_megapixel: 0.001
      usd_per_output_megapixel: 0.001
      # Advertised "$1 per thousand output image megapixels" (~$0.001/1MP) is
      # 15x below the 9B sibling with asymmetric units — anomalous. Until a
      # billed prediction verifies real cost, the formula stays unverified and
      # every successful run reconciles at the full reserved amount.
      formula_verified: false
      # Deliberately pessimistic (not the advertised price): planning
      # estimate assumes 9B-level pricing, reservation adds further headroom.
      expected_cost_per_generation_usd: 0.015
      max_cost_per_generation_usd: 0.05
      checked_on: 2026-07-13
      source_url: https://replicate.com/black-forest-labs/flux-2-klein-4b
    terms:
      model_licence: >-
        Apache 2.0 per the Replicate README ("fully open source under Apache
        2.0"); BFL docs confirm klein 4B = Apache 2.0.
      commercial_use: "Apache 2.0 weights; outputs usable commercially."
      input_retention: "Not stated on the model page; see platform terms."
      output_ownership: "Replicate ToS assigns Output to the customer."
      training_use: "Not stated on the model page; see platform terms."
      unresolved:
        - Advertised pricing ($1 per thousand output MP) is anomalously low
          vs klein 9B ($0.015 per output MP) with asymmetric units — verify
          against a real billed prediction before trusting any calculation.
        - JSON prompting support for the klein variant specifically is
          unverified.
      sources:
        - https://replicate.com/black-forest-labs/flux-2-klein-4b
        - https://docs.bfl.ai/flux_2/flux2_overview
      verified_on: 2026-07-13
    notes: >-
      Embedded latest version id (provenance only):
      8e9c42d77b10a2a41af823ac4500f7545be6ebc4e745830fc3f3de10de200542.
      Fast-tier challenger to Schnell: compared head-to-head in screening;
      neither replaces the other until screening evidence is scored.
