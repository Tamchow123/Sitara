  - key: flux-2-pro
    name: FLUX.2 Pro
    replicate_id: black-forest-labs/flux-2-pro
    version: null
    categories: [balanced, reference, editing]
    capabilities:
      seed: true
      seed_param: seed
      aspect_ratios: ["match_input_image", "custom", "1:1", "16:9", "3:2", "2:3", "4:5", "5:4", "9:16", "3:4", "4:3"]
      resolution_note: >-
        resolution enum match_input_image / 0.5 MP / 1 MP / 2 MP / 4 MP
        (default 1 MP; 2 MP or below recommended); custom width/height
        256-2048 in multiples of 16.
      negative_prompt: false
      reference_image: true
      reference_image_param: input_images
      max_reference_images: 8
      image_editing: true
      image_editing_param: input_images
      image_editing_param_is_list: true
      json_prompting: true
      input_format_note: >-
        prompt, seed, input_images (array, max 8; used for both reference
        conditioning and editing), resolution, aspect_ratio,
        safety_tolerance 1-5, output_format webp/jpg/png. README explicitly:
        the model does not understand negative prompts. JSON structured
        prompting officially documented for FLUX.2
        (docs.bfl.ai/guides/usecases_t2i_json_prompting).
    pricing:
      unit: per_megapixel
      usd_per_unit: 0.015
      # $0.015 per run + $0.015 per output MP (1 MP portrait, no inputs).
      expected_cost_per_generation_usd: 0.03
      # Headroom for runs with several ~1MP reference/edit inputs at $0.015
      # per input MP, and for the additive billing formula being unresolved.
      max_cost_per_generation_usd: 0.12
      checked_on: 2026-07-13
      source_url: https://replicate.com/black-forest-labs/flux-2-pro
    terms:
      model_licence: "Proprietary, API-served; BFL/Replicate terms apply."
      commercial_use: "Governed by BFL ToS + Replicate ToS (see platform terms)."
      input_retention: "Not stated on the model page; see platform terms."
      output_ownership: >-
        BFL ToS claims no ownership of Outputs; Replicate ToS assigns Output
        to the customer.
      training_use: >-
        BFL ToS train-and-improve licence (coverage of Replicate-routed
        traffic unresolved).
      unresolved:
        - Additive per-run + per-MP billing formula assumed; confirm with a billed test run.
        - JSON prompting documented for FLUX.2 generally; per-variant behaviour unverified.
      sources:
        - https://replicate.com/black-forest-labs/flux-2-pro
        - https://docs.bfl.ai/flux_2/flux2_overview
      verified_on: 2026-07-13
    notes: >-
      Embedded latest version id (provenance only):
      ccb5e33141097816e6fab8c895e702fe4c619e4e07500885b71214e9f6382a5c.
      BFL docs call FLUX.2 pro the recommended default for generation and
      editing; Kontext pages now point editing users at FLUX.2 pro/flex.

