# Candidate FLUX models for the Sitara Phase 2 evaluation.
#
# All facts below were verified against LIVE official pages on 2026-07-13
# (replicate.com model pages incl. embedded API schemas, replicate.com/pricing,
# docs.bfl.ai, bfl.ai/legal/terms-of-service). Pricing and terms are
# TIME-SENSITIVE: re-verify official pages immediately before any live run.
#
# Official BFL models on Replicate are versionless (invoked as owner/model);
# the "embedded latest version id" recorded in notes is provenance only and
# may rotate silently.
#
# NO production model is selected by this file. The application will
# configure its model through environment variables after the evaluation and
# decision record are complete (docs/decisions/0001-image-model.md).
#
# Category coverage:
#   fast            -> flux-schnell AND flux-2-klein-4b (compared head-to-head
#                      in screening; klein's anomalously low advertised price
#                      is covered by a generous conservative reservation and
#                      flagged for billed verification)
#   balanced        -> flux-2-pro (also reference + editing), flux-1.1-pro (FLUX.1-era baseline)
#   highest_quality -> flux-2-max (also reference + editing)
#   reference/edit  -> flux-2-pro, flux-2-max, flux-2-klein-4b
#
# Considered and removed: flux-kontext-pro — its prompt doubles as an edit
# instruction and BFL labels the Kontext family previous-generation, pointing
# editing users at FLUX.2 pro/flex; since FLUX.2 pro and max already cover
# reference conditioning AND editing in this evaluation, Kontext added spend
# without adding a decision-relevant axis. It can return later as an
# editor-only experiment (a candidate with text_to_image: false plus a
# separately specified base model) if FLUX.2 editing disappoints.
# Also not selected: flux-pro ($0.055), superseded by flux-1.1-pro ($0.04).
#
# Cost-accounting note: `formula_verified: true` means the billing formula is
# fully understood (flat per-image); only then may successful runs reconcile
# to an input-aware calculated cost. Where false (FLUX.2 per-run + per-MP
# assumed additive; klein pricing anomaly), successful runs reconcile at the
# FULL reserved amount so the ledger can never undercount spend.

requires_manual_verification: false

platform_terms:
  summary: >-
    Replicate assigns all right, title and interest in Output to the
    customer; outputs are usable commercially subject to third-party (BFL)
    terms. BFL-routed models additionally require the Flux Model API
    Agreement and BFL ToS, which prohibit military/surveillance/biometric
    uses. BFL ToS claims no ownership of outputs but takes a perpetual,
    irrevocable licence to use Inputs and Outputs to provide, develop, train
    and improve BFL technologies.
  commercial_use: >-
    Replicate ToS: Output usable for commercial purposes such as sale or
    publication, subject to any Third Party Terms.
  input_retention: >-
    Replicate privacy policy states retention "for as long as necessary to
    provide our Services"; no explicit prediction input/output retention
    window is published.
  training_use: >-
    Replicate creates anonymised/aggregated Resultant Data for service
    improvement. BFL ToS (bfl.ai) grants BFL a perpetual, irrevocable licence
    to use Input and Output to train and improve its technologies; whether
    this clause covers Replicate-routed API traffic is unresolved.
  unresolved:
    - Replicate publishes no explicit retention window for prediction inputs/outputs.
    - The separate "Flux Model API Agreement" referenced by Replicate was not
      fetched; confirm whether BFL's train-and-improve licence covers
      Replicate-routed requests.
  sources:
    - https://replicate.com/terms
    - https://replicate.com/privacy
    - https://bfl.ai/legal/terms-of-service
  verified_on: 2026-07-13

candidates:
