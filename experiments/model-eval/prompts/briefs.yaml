# South Asian bridalwear evaluation briefs.
#
# Screening subset (ids prefixed scr-) covers every required garment
# (lehenga, saree, gharara, sharara, anarkali, shalwar kameez), every
# required ceremony (nikah, mehndi, baraat, walima), modest full-sleeve
# styling, and both heavy and minimal embellishment.
#
# `inspiration_metadata` is present only on briefs used for the metadata
# inspiration mode; `reference_ids` only on briefs used for the
# reference_image mode (ids must exist in references/manifest.yaml with
# rights_status: verified before a live run will send them).
#
# `refinement` entries apply exactly one constrained change and are used by
# the refinement experiments (fresh regeneration vs image editing).

briefs:
  # ---------------------------------------------------------------- screening
  - id: scr-lehenga-baraat-heavy
    garment: lehenga
    ceremony: baraat
    region: Punjabi
    palette: deep red and antique gold
    fabric: raw silk with a heavily flared kalidar skirt
    embellishment_level: heavy
    embellishment_techniques: [zardozi, dabka, sequin highlights]
    sleeves: elbow-length fitted sleeves
    neckline: sweetheart neckline with an embroidered edge
    coverage: fitted choli with a modest midriff covered by the dupatta drape
    dupatta: heavily bordered dupatta draped over the shoulder
    tags: [screening, heavy, classic-red]

  - id: scr-saree-walima-minimal
    garment: saree
    ceremony: walima
    region: Pakistani
    palette: ivory and soft gold
    fabric: chiffon saree with a satin-finish border
    embellishment_level: minimal
    embellishment_techniques: [fine pearl edging]
    sleeves: full sleeves on the blouse
    neckline: high round neckline
    coverage: fully covered torso with a pallu pinned across the chest
    dupatta: pallu draped over the shoulder in neat pleats
    refinement:
      id: ivory-to-deep-red
      description: the colour palette from ivory and soft gold to deep red and antique gold
      field: palette
      from_value: ivory and soft gold
      to_value: deep red and antique gold
    tags: [screening, minimal, modest]

  - id: scr-gharara-nikah-heavy
    garment: gharara
    ceremony: nikah
    region: Lucknowi
    palette: pale rose gold and ivory
    fabric: pure silk kameez with wide-flared gharara legs gathered at the knee
    embellishment_level: heavy
    embellishment_techniques: [kamdani, zardozi, gota lace on the knee joint]
    sleeves: full sleeves
    neckline: boat neckline with a fine embroidered border
    coverage: knee-length kameez fully covering the torso
    dupatta: draped over the shoulder
    refinement:
      id: shoulder-to-head-dupatta
      description: the dupatta drape from over the shoulder to over the head
      field: dupatta
      from_value: draped over the shoulder
      to_value: draped over the head
    inspiration_metadata:
      garment_type: traditional Lucknowi gharara
      silhouette: fitted kameez with dramatic knee-flare legs
      colour_palette: rose gold, ivory, hints of pistachio
      embroidery: kamdani and fine zardozi
      fabric: pure silk with brocade knee panels
      dupatta_placement: single dupatta, shoulder drape
      regional_note: Awadhi bridal tradition
    tags: [screening, heavy, gharara-vs-sharara]

