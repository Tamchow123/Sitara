# Sitara local development stack (Phase 3A).
#
# Credentials below are LOCAL-DEVELOPMENT-ONLY values; real deployments take
# everything from the environment (see .env.example). No real secrets live
# in this file.
#
# Local ports: web 3001 (3000 is occupied by another local project on this
#              machine; override with WEB_PORT), api 8000, postgres 5432,
#              redis 6379, minio API 9000, minio console 9001.

name: sitara

x-api-environment: &api-environment
  APP_ENV: development
  DEBUG: "true"
  DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
  DATABASE_URL: postgres://sitara:sitara-dev-password@postgres:5432/sitara
  REDIS_URL: redis://redis:6379/0
  # Separate logical DB for the Django cache (auth rate limiting).
  REDIS_CACHE_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
  CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://localhost:3001
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: sitara-minio
  S3_SECRET_ACCESS_KEY: sitara-minio-dev-password
  S3_BUCKET_NAME: sitara-media
  S3_REGION_NAME: us-east-1
  # Fail-closed AI gates (Phase 2 decision defaults):
  DEFAULT_IMAGE_MODEL: black-forest-labs/flux-1.1-pro
  FAST_IMAGE_MODEL: black-forest-labs/flux-1.1-pro
  DEMO_MODE: ${DEMO_MODE:-true}
  ALLOW_PAID_AI_CALLS: ${ALLOW_PAID_AI_CALLS:-false}
  # Provider tokens: present or empty, their presence NEVER enables a call
  # (fail-closed policy). Structured DesignSpec generation (Phase 8) settings:
  # numeric values are strict positive integers; ANTHROPIC_MODEL must be
  # non-empty. Live generation additionally requires --confirm-live and
  # DEMO_MODE=false + ALLOW_PAID_AI_CALLS=true.
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
  DESIGN_SPEC_MAX_INPUT_CHARS: ${DESIGN_SPEC_MAX_INPUT_CHARS:-20000}
  DESIGN_SPEC_MAX_OUTPUT_TOKENS: ${DESIGN_SPEC_MAX_OUTPUT_TOKENS:-4096}
  ANTHROPIC_TIMEOUT_SECONDS: ${ANTHROPIC_TIMEOUT_SECONDS:-60}
  # Gated Replicate image rendering (Phase 10). LIVE_GENERATION_ENABLED gates
  # the public end-to-end generation API and defaults to false, so accidental
  # paid generation is impossible even with both provider gates open. Live
  # rendering additionally requires DEMO_MODE=false + ALLOW_PAID_AI_CALLS=true
  # and a real REPLICATE_API_TOKEN. Numeric values are strict positive integers.
  LIVE_GENERATION_ENABLED: ${LIVE_GENERATION_ENABLED:-false}
  REPLICATE_TIMEOUT_SECONDS: ${REPLICATE_TIMEOUT_SECONDS:-30}
  REPLICATE_POLL_INTERVAL_SECONDS: ${REPLICATE_POLL_INTERVAL_SECONDS:-2}
  REPLICATE_POLL_TIMEOUT_SECONDS: ${REPLICATE_POLL_TIMEOUT_SECONDS:-180}
  GENERATION_RAW_MAX_BYTES: ${GENERATION_RAW_MAX_BYTES:-20000000}
  GENERATION_RAW_MAX_PIXELS: ${GENERATION_RAW_MAX_PIXELS:-40000000}
  # Application-level cap on versions per design (initial concept + one
  # refinement). Strict positive integer; invalid values refuse startup.
  MAX_DESIGN_VERSIONS: ${MAX_DESIGN_VERSIONS:-2}
  # Inspiration-catalogue ingestion bounds (Phase 5B). Strict positive
  # integers; invalid values refuse startup.
  INSPIRATION_MAX_UPLOAD_BYTES: ${INSPIRATION_MAX_UPLOAD_BYTES:-15000000}
  INSPIRATION_MAX_IMAGE_PIXELS: ${INSPIRATION_MAX_IMAGE_PIXELS:-40000000}
  INSPIRATION_OUTPUT_MAX_EDGE: ${INSPIRATION_OUTPUT_MAX_EDGE:-2048}
  INSPIRATION_THUMBNAIL_EDGE: ${INSPIRATION_THUMBNAIL_EDGE:-512}
  # Permanent private design-image storage (Phase 11). The backend selection
  # is strict (exactly s3 or filesystem); processing bounds are strict
  # positive integers with documented ranges; the signing endpoint is the
  # BROWSER-reachable MinIO origin (the API talks to minio:9000 internally,
  # but a presigned URL must resolve from the host machine).
  DESIGN_IMAGE_STORAGE_BACKEND: ${DESIGN_IMAGE_STORAGE_BACKEND:-s3}
  DESIGN_IMAGE_FILESYSTEM_ROOT: ${DESIGN_IMAGE_FILESYSTEM_ROOT:-/app/private-design-images}
  DESIGN_IMAGE_MAX_EDGE: ${DESIGN_IMAGE_MAX_EDGE:-2048}
  DESIGN_IMAGE_THUMBNAIL_EDGE: ${DESIGN_IMAGE_THUMBNAIL_EDGE:-512}
  DESIGN_IMAGE_WEBP_QUALITY: ${DESIGN_IMAGE_WEBP_QUALITY:-90}
  DESIGN_IMAGE_THUMBNAIL_QUALITY: ${DESIGN_IMAGE_THUMBNAIL_QUALITY:-82}
  DESIGN_IMAGE_SIGNED_URL_TTL_SECONDS: ${DESIGN_IMAGE_SIGNED_URL_TTL_SECONDS:-300}
  S3_SIGNED_URL_ENDPOINT_URL: ${S3_SIGNED_URL_ENDPOINT_URL:-http://localhost:9000}

services:
  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: sitara
      POSTGRES_PASSWORD: sitara-dev-password
      POSTGRES_DB: sitara
    ports:
      - "${BIND_HOST:-127.0.0.1}:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitara -d sitara"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7.4.1-alpine
    ports:
      - "${BIND_HOST:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sitara-minio
      MINIO_ROOT_PASSWORD: sitara-minio-dev-password
    ports:
      - "${BIND_HOST:-127.0.0.1}:9000:9000"
      - "${BIND_HOST:-127.0.0.1}:9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio-init:
    build: apps/api
    command: ["python", "/init/create_bucket.py"]
    environment: *api-environment
    volumes:
      - ./infra/minio:/init:ro
    depends_on:
      minio:
        condition: service_healthy

  migrate:
    build: apps/api
    command: ["python", "manage.py", "migrate", "--noinput"]
    environment: *api-environment
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: apps/api
    ports:
      - "${BIND_HOST:-127.0.0.1}:8000:8000"
    environment: *api-environment
    # The Django/Vitest cross-language validation contract lives at the repo
    # root (outside the apps/api build context) and is consumed read-only by
    # apps/api/sitara/questionnaire/tests/contract.py, which looks for it at
    # /contracts — see that module's docstring.
    volumes:
      - ./contracts:/contracts:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  celery:
    build: apps/api
    # Listen to BOTH the durable generation queue and the default celery queue
    # (the latter keeps the health ping working). Explicit -Q so routing is
    # unambiguous on every host (no native invocation on Windows).
    command: ["celery", "-A", "config", "worker", "-Q", "generation,celery", "--loglevel=info"]
    environment: *api-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build: apps/web
    ports:
      - "${BIND_HOST:-127.0.0.1}:${WEB_PORT:-3001}:3000"
    environment:
      # Server-only: the Next.js rewrite proxies /api/* here. The browser
      # never sees this host — it talks to the web origin only.
      API_INTERNAL_BASE_URL: http://api:8000
    # `npm run generate:api` reads the committed OpenAPI schema via the
    # relative path ../api/openapi/schema.json (see apps/web/package.json),
    # which resolves to /api/openapi/schema.json from this container's
    # WORKDIR — outside the apps/web build context, so it is bind-mounted
    # read-only here. This mount satisfies only the INPUT side: this
    # service has no bind mount of apps/web/src, so `docker compose exec
    # web npm run generate:api` writes schema.d.ts inside the container
    # only. To persist a regenerated schema.d.ts back to the host, add a
    # temporary src mount, e.g.
    #   docker compose run --rm -v ./apps/web/src:/app/src web npm run generate:api
    #
    # The shared Django/Vitest cross-language validation contract (see the
    # api service's mount above) is consumed the same way here by
    # src/features/questionnaire/validation.test.ts.
    volumes:
      - ./apps/api/openapi:/api/openapi:ro
      - ./contracts:/contracts:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
